name: Publish Quarto Report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render Quarto report
        run: |
          mkdir -p _site
          quarto render reports/public_health_summary_report.qmd --output-dir ../_site

      - name: Inspect rendered site
        run: find . -maxdepth 5 -type f -name "*.html" -print

      - name: Prepare Pages root
        run: |
          REPORT_HTML=$(find . -path "*_site*" -type f -name "public_health_summary_report.html" | head -n 1)
          if [ -z "$REPORT_HTML" ]; then
            echo "Rendered report HTML not found"
            find . -maxdepth 5 -type f -print
            exit 1
          fi
          mkdir -p _site
          cp "$REPORT_HTML" _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
